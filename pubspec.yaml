name: goathub
description: Goat Health Hub - Connect farmers with veterinarians
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  fl_chart: ^0.68.0  # For beautiful charts
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.7.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  
  # Navigation
  go_router: ^17.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  
  # Utilities
  intl: ^0.20.2  # For date formatting (updated to match form_builder_validators requirement)
  path_provider: ^2.1.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/